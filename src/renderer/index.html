<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:">
  <title>Finch</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/print.css" media="print">
</head>
<body>

<!-- ─── App Shell ──────────────────────────────────────────────────────────── -->
<div id="app-shell">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header drag-region">
      <div class="logo-wrap no-drag">
        <div class="logo-mark">
          <!-- Finch bird mark -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
          </svg>
        </div>
        <span class="logo-text">Finch</span>
      </div>
      <div class="win-controls">
        <button class="win-btn close"    id="wc-close"    title="Close"    data-i18n-title="common.close"></button>
        <button class="win-btn minimize" id="wc-minimize" title="Minimize" data-i18n-title="common.minimize"></button>
        <button class="win-btn maximize" id="wc-maximize" title="Maximize" data-i18n-title="common.maximize"></button>
      </div>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label" data-i18n="nav.main">Main</span>

      <button class="nav-item active" data-route="#/dashboard">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span data-i18n="nav.dashboard">Dashboard</span>
      </button>

      <button class="nav-item" data-route="#/invoices">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <span data-i18n="nav.invoices">Invoices</span>
      </button>

      <button class="nav-item" data-route="#/reports">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span data-i18n="nav.reports">Reports</span>
      </button>

      <button class="nav-item" data-route="#/clients">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
        <span data-i18n="nav.clients">Clients</span>
      </button>

      <span class="nav-section-label" data-i18n="nav.account">Account</span>

      <button class="nav-item" data-route="#/settings">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        <span data-i18n="nav.settings">Settings</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">U</div>
        <div>
          <div class="user-name" id="user-name">User</div>
          <div class="user-sub" data-i18n="nav.free_plan">Free plan</div>
        </div>
      </div>
      <button class="sidebar-action-btn" id="logout-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
        </svg>
        <span data-i18n="nav.sign_out">Sign out</span>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main id="main-content">
    <div id="app-view"></div>
  </main>

</div>

<!-- Toast & modals -->
<div id="toast-container"></div>

<script src="scripts/app.bundle.js"></script>
</body>
</html>
